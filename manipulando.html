<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulação</title>
</head>
<h1 id="titulo">Manipulação de Elementos</h1>
<body>
    <script>
        // Manipulação de elementos
        let titulo = document.getElementById("titulo");
        titulo.style.color = "blue";
        titulo.style.fontSize = "24px";
        titulo.textContent = "Manipulação de Elementos em JavaScript";
        titulo.innerHTML += " <span style='color: red;'>- Editado!</span>"; 
        // diferença de textContent e innerHTML - textContent apenas altera o texto, enquanto innerHTML pode alterar o conteúdo HTML, permitindo a adição de elementos e estilos.
    </script>
</body>
</html>
