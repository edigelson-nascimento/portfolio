<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>
</head>
<body>
    <h1 id="contador">0</h1>
    <button onclick="somar()">+</button>
    <script>
        let contador = 0;
        function somar() {
            contador++;
            document.getElementById("contador").textContent = contador;
        }
    </script>
</body>
</html>
