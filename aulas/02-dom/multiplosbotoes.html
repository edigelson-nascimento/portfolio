<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Múltiplos Botões</title>
</head>
<body>
    <!--
        Três botões com a mesma classe "produto" e dados diferentes.
        O JS vai selecionar todos e adicionar um evento de clique
        individual para cada um, exibindo seus dados no console.

        data-id:     identificador único
        data-nome:   nome do produto
        data-preco:  valor do produto
    -->
    <button class="produto" data-id="1" data-nome="Mouse" data-preco="50.00">Mouse</button>
    <button class="produto" data-id="2" data-nome="Teclado" data-preco="100.00">Teclado</button>
    <button class="produto" data-id="3" data-nome="Monitor" data-preco="500.00">Monitor</button>

    <script src="js/multiplosbotoes.js"></script>
</body>
</html>
