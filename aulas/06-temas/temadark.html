<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Theme</title>
</head>
<body>
    <h1>Dark Theme</h1>

    <!--
        Botão que alterna entre modo claro e escuro.
        O JS adiciona/remove a classe "dark-mode" no <body>
        e injeta dinamicamente o CSS para o tema escuro.
    -->
    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>

    <script src="js/temadark.js"></script>
</body>
</html>
