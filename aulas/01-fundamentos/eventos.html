<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>
</head>
<body>
    <h1>Eventos!</h1>

    <!--
        onclick="boasVindas()" é um evento inline HTML.
        Quando o botão é clicado, a função boasVindas() é executada.
    -->
    <button onclick="boasVindas()">Clique aqui</button>

    <!--
        O arquivo eventos.js também adiciona eventos via JS:
        - click na página inteira
        - mouseover (mouse sobre a página)
        - keydown (tecla pressionada)
    -->
    <script src="js/eventos.js"></script>
</body>
</html>
