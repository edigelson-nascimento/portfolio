<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SessionStorage</title>
</head>
<body>
    <!--
        Campo para o usuário digitar o nome.
        O botão salva o valor no sessionStorage do navegador.
        Dados persistem apenas durante a sessão (enquanto a aba estiver aberta).
    -->
    <input type="text" id="nome" placeholder="Digite seu nome">
    <button onclick="salvarNome()">Salvar Nome</button>

    <script src="js/sessionStorage.js"></script>
</body>
</html>
