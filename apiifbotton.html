<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async/Await</title>
</head>
<body>
    <!-- Buscar usuario -->
    <button id="botao">Buscar Usuário</button>
    <p id="resultado"></p>
    
    <!-- O código JavaScript para carregar os usuários usando async/await -->
    <script>
      const botao = document.getElementById('botao');
      const resultado = document.getElementById('resultado');

      botao.addEventListener('click', async () => {
        resultado.textContent = 'Carregando...';
        try {
          const response = await fetch('https://jsonplaceholder.typicode.com/users/1');
          
          if (!response.ok) {
            throw new Error('Erro ao carregar os usuários');
          }
          
          const dadosUsuarios = await response.json();
          resultado.textContent = `Nome: ${dadosUsuarios.name}, Email: ${dadosUsuarios.email}`;
          
        } catch (error) {
          resultado.textContent = `Erro: ${error.message}`;
        }
      }); // <-- CORRIGIDO: Faltava fechar as chaves e os parênteses
    </script>
</body>
</html>
