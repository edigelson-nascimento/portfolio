<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test api</title>
</head>
<body>
    <button id="carregar">Carregar Dados</button>
    <ul id="resultado"></ul>
    <script>
        const carregarBtn = document.querySelector('#carregar');
        const resultadoList = document.querySelector('#resultado');

        carregar.addEventListener('click', ()=> {
            fetch('https://jsonplaceholder.typicode.com/users')
                .then(response => response.json())
                .then(data => {
                    resultadoList.innerHTML = ''; // Limpa a lista antes de adicionar novos itens
                    data.forEach(user => {
                        const listItem = document.createElement('li');
                        listItem.textContent = user.name; // Exibe o nome do usuário
                        resultadoList.appendChild(listItem);
                    });
                })
                .catch(error => console.error('Erro ao carregar os dados:', error));
        });
        </script>
</body>
</html>
