<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do produto</title>
</head>
<body>
    <!--- Exemplo de detalhes do produto -->
    <h2 id="titulo-produto">Detalhes do Produto</h2>
    <p id="preco-produto">Preço: R$ 100,00</p>
    <button id="produto" data-nome="Mouse Gamer" data-preco="100.00">Ver Mouse</button>
    <button id="produto" data-nome="Teclado Gamer" data-preco="200.00">Ver Teclado</button>

    <script>
        const botoes = document.querySelectorAll('#produto');

        botoes.forEach(botao => {
            botao.addEventListener('click', () => {
                const nome = botao.getAttribute('data-nome');
                const preco = botao.getAttribute('data-preco');

                document.getElementById('titulo-produto').textContent = `Detalhes do ${nome}`;
                document.getElementById('preco-produto').textContent = `Preço: R$ ${preco}`;
            });
        });
    </script>
</body>
</html>
